[pytest]
# ─────────────────────────────────────────────────────────────────────────────
# Warning filters
# ─────────────────────────────────────────────────────────────────────────────
filterwarnings =
    # Legacy test scripts return True/False (harmless — tests still assert correctly)
    ignore::pytest.PytestReturnNotNoneWarning

    # LangChain initialize_agent is deprecated; migrating to LangGraph is a
    # separate task — suppress until the agent layer is rebuilt.
    ignore::langchain_core._api.deprecation.LangChainDeprecationWarning

    # reward_model.joblib was trained on sklearn 1.6.1; retrain to silence.
    ignore::sklearn.exceptions.InconsistentVersionWarning

    # BeautifulSoup HTML parser hint inside the wikipedia package (third-party)
    ignore::bs4.GuessedAtParserWarning

# ─────────────────────────────────────────────────────────────────────────────
# Test discovery
# ─────────────────────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ─────────────────────────────────────────────────────────────────────────────
# Output
# ─────────────────────────────────────────────────────────────────────────────
# Show extra test summary for failures and errors only
addopts = -ra --tb=short
